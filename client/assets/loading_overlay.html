<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: transparent;
    }
    video {
      width: 420px;
      height: 420px;
      object-fit: contain;
      background: transparent;
      /* Убираем любой фон плеера, чтобы альфа-канал был виден. */
      mix-blend-mode: normal;
    }
    #msg {
      margin-top: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="vid" autoplay loop muted playsinline webkit-playsinline>
      <source src="zagruuuuzka.webm" type="video/webm" />
    </video>
    <div id="msg"></div>
  </div>
  <script>
    // Автоплей с зацикливанием (на случай, если autoplay заблокирован).
    var v = document.getElementById('vid');
    v.loop = true;
    v.muted = true;
    var p = v.play();
    if (p && typeof p.catch === 'function') {
      p.catch(function () {
        document.addEventListener('touchstart', function () { v.play(); }, { once: true });
      });
    }
    // Сообщение передаётся через postMessage из Flutter.
    window.addEventListener('message', function (e) {
      var m = (e && e.data) ? e.data : null;
      if (m && m.message !== undefined) {
        document.getElementById('msg').textContent = m.message || '';
      }
    });
  </script>
</body>
</html>
