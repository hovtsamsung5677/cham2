name: flutter_application_1
description: "Mobile furniture recoloring app with realistic texture preservation"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera for taking photos
  camera: ^0.11.0+2

  # Image picker for selecting existing photos
  image_picker: ^1.1.2

  # Image processing for recoloring algorithm
  image: ^4.3.0

  # Color picker UI
  flex_color_picker: ^3.6.0

  # Path provider for file operations
  path_provider: ^2.1.4

  # Permission handling
  permission_handler: ^11.3.1

  # Provider for state management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.2
  
  # Path manipulation
  path: ^1.9.0

  # Sharing files
  share_plus: ^13.2.0

  # Save image to gallery
  gallery_saver: ^2.3.2

  # HTTP client for server communication
  http: ^0.13.6

  # HTTP parser for multipart requests
  http_parser: ^4.1.2

  # Video playback for loading screen (iOS transparent video)
  video_player: ^2.9.0

  # WebView for transparent video on Android (VP9 alpha in WebM)
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  flutter_dotenv: ^6.0.1
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logotip.png
