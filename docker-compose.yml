services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
      
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - ai-server
    networks:
      - segmentation-network

  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: segment-ai:latest
    container_name: segment-ai
    restart: unless-stopped
    ports:
      - "8001:8001"


    # ---------- ОПТИМИЗАЦИЯ ПАМЯТИ ----------
    shm_size: 16g               # Разделяемая память для PyTorch/NCCL
    ipc: host                   # Доступ к IPC хоста

    environment:
      - PORT=8001
      # Путь к кешу Hugging Face
      - HF_HOME=/root/.cache/huggingface
      # Токен для доступа к моделям (если нужно)
      - HF_TOKEN=${HF_TOKEN}
      # Оптимизация аллокатора CUDA
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Отключаем проверку безопасности (если нужно)
      - DISABLE_SAFETY_CHECKER=True

    # Можно оставить и env_file, но я продублировал в environment
    env_file:
      - .env

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    volumes:
      # Кеш моделей Hugging Face (уже скачаны)
      - ./hf_cache:/root/.cache/huggingface
      # Debug-артефакты запросов (видно на хосте в ./server/debug_output/)
      - ./server/debug_output:/app/debug_output
      # (Опционально) для быстрой правки кода без пересборки:
      # - ./server/app.py:/app/app.py

    networks:
      - segmentation-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  segmentation-network:
    driver: bridge
